<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAteam Chat</title>
  <style>
    :root{
      --bg:#212121; --side:#171717; --top:#181818; --panel:#2a2a2a;
      --line:#3f3f46; --text:#ececec; --muted:#9ca3af; --muted2:#8d939c;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 "Söhne","ui-sans-serif",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
    .app{display:grid;grid-template-columns:300px 1fr;height:100vh}
    .app.sidebar-collapsed{grid-template-columns:0 1fr}

    .sidebar{background:var(--side);border-right:1px solid var(--line);padding:10px;overflow:auto;position:sticky;top:0;height:100vh}
    .app.sidebar-collapsed .sidebar{padding:0;border-right:0;overflow:hidden}
    .group-title{display:flex;justify-content:space-between;align-items:center;margin:10px 6px 6px;font-size:12px;color:var(--muted)}
    .separator{border-top:1px solid #2c2c2c;margin:10px 6px}
    .item{display:flex;align-items:center;gap:6px;padding:8px;border-radius:8px;cursor:pointer}
    .item:hover{background:#242424}
    .item.active{background:#2b2b2b}
    .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .icon-btn{border:0;background:none;color:var(--muted2);cursor:pointer;font-size:13px;opacity:.75}
    .icon-btn:hover{opacity:1;color:#b8bec8}

    .main{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .top{display:flex;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--top);position:sticky;top:0;z-index:5}
    .btn{border:1px solid var(--line);background:transparent;color:var(--text);padding:8px 10px;border-radius:8px;cursor:pointer}
    select,input{background:#222;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px;font-family:inherit}

    .messages{flex:1;overflow:auto;padding:26px 12px;display:flex;flex-direction:column;gap:18px;min-height:0}
    .msg-row{width:min(100%,900px);margin:0 auto;display:flex}
    .msg-row.user{justify-content:flex-end}
    .msg-row.assistant{justify-content:flex-start}
    .msg-row.user > div{margin-left:auto;display:inline-flex;flex-direction:column;align-items:flex-end;max-width:min(72%,56ch)}
    .msg-row.assistant > div{display:flex;flex-direction:column;align-items:flex-start;max-width:100%}
    .msg{max-width:820px;width:fit-content;padding:8px 12px;border-radius:14px;white-space:pre-wrap;line-height:1.45}
    .msg.assistant{background:transparent;border:none;border-radius:0;padding-left:0;max-width:78ch;font-size:18px;color:#e8eaee;line-height:1.6}
    .msg.user{background:#1f6feb;color:#f8fbff;border-radius:18px;display:inline-block;width:fit-content;max-width:100%;padding:8px 12px;font-size:16px;line-height:1.5;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word}
    .msg-foot{display:flex;justify-content:flex-end;margin-top:4px;width:100%}
    .copy{background:transparent;border:0;color:#aeb4be;font-size:13px;cursor:pointer;line-height:1;padding:3px 4px;border-radius:6px}
    .copy:hover{background:#2a2a2a;color:#d6dbe3}
    .msg-actions{display:flex;gap:10px;margin-top:6px;align-items:center}
    .assistant-body p{margin:0 0 10px}
    .assistant-body h3{margin:12px 0 10px;font-size:20px;line-height:1.4}
    .assistant-body ul{margin:6px 0 12px 20px;padding:0}
    .assistant-body li{margin:6px 0;font-size:17px;line-height:1.6}
    .assistant-body blockquote{margin:10px 0;padding:8px 12px;border-left:3px solid #4b5563;background:#242424;border-radius:6px;color:#d9dde5}
    .assistant-body strong{font-weight:650}
    .msg-icon{border:0;background:transparent;color:#d0d4db;cursor:pointer;font-size:16px;line-height:1;padding:2px}
    .msg-icon:hover{color:#ffffff}

    .typing{display:flex;align-items:center;gap:8px;color:#b8bec8;font-size:14px}
    .typing-spinner{width:14px;height:14px;border:2px solid #4b5563;border-top-color:#d1d5db;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .composer{padding:12px;background:var(--top);border-top:1px solid var(--line)}
    .composer-wrap{max-width:900px;margin:0 auto;display:flex;gap:10px}
    textarea{flex:1;resize:none;height:90px;border-radius:12px;background:#222;color:var(--text);border:1px solid var(--line);padding:12px 14px;font-family:inherit;font-size:17px;line-height:1.5}


    .main.home-mode .top{border-bottom:none}
    .main.home-mode .messages{display:none}
    .main.home-mode .composer{margin:auto 0 28vh;border-top:none;background:transparent}
    .home-hero{display:none;text-align:center;color:#f3f4f6;font-size:42px;line-height:1.2;font-weight:500;margin-top:18vh}
    .main.home-mode .home-hero{display:block}
    .composer-wrap{transition:max-width .2s ease}
    .main.home-mode .composer-wrap{max-width:780px;display:block}
    .main.home-mode textarea{height:56px;border-radius:28px;padding:16px 120px 16px 20px;overflow:hidden}
    .main.home-mode .send-circle{position:absolute;right:10px;top:9px}
    .composer-box{position:relative}

    .params{display:none;position:absolute;right:14px;top:58px;background:#1f1f1f;border:1px solid var(--line);padding:10px;border-radius:10px;width:300px}
    .params.open{display:block}
    .param{display:grid;grid-template-columns:1fr 95px;gap:8px;margin-bottom:8px;align-items:center}

    #sendBtn.send-circle{width:38px;height:38px;border-radius:999px;background:#fff;color:#111;border:none;display:inline-flex;align-items:center;justify-content:center;padding:0}
    #sendBtn.send-circle svg{width:18px;height:18px;stroke:#111;stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    #sendBtn.send-circle:hover{background:#e8e8e8}
  </style>
</head>
<body>
<!-- VERSION_FIX_V6 -->
<div class="app">
  <aside class="sidebar">
    <div id="chatList"></div>
  </aside>

  <section class="main">
    <div class="top">
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn" id="toggleSidebarBtn" title="Ouvrir/Fermer la barre latérale">☰</button>
        <select id="modelSelect"></select>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="apiKey" type="password" placeholder="Clé API OpenAI" />
        <button class="btn" id="paramsBtn">Paramètres</button>
      </div>
      <div id="paramsPanel" class="params"></div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="home-hero" id="homeHero">Qu'est-ce qui vous intéresse aujourd'hui ?</div>

    <div class="composer">
      <div class="composer-wrap"><div class="composer-box">
        <textarea id="prompt" placeholder="Poser une question"></textarea>
        <button class="send-circle" id="sendBtn" aria-label="Envoyer" title="Envoyer"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V6"></path><path d="M6.5 11.5 12 6l5.5 5.5"></path></svg></button>
      </div></div>
    </div>
  </section>
</div>

<script>
  const MODEL_GROUPS = [
    { label: "OpenAI GPT-5.5", models: ["gpt-5.5", "gpt-5.5-pro"] },
    { label: "OpenAI GPT-5.4", models: ["gpt-5.4", "gpt-5.4-mini", "gpt-5.4-nano"] },
    { label: "OpenAI GPT-5 / 5.2", models: ["gpt-5", "gpt-5-mini", "gpt-5-nano", "gpt-5.2"] },
    { label: "OpenAI GPT-4", models: ["gpt-4.1", "gpt-4.1-mini", "gpt-4.1-nano", "gpt-4o", "gpt-4o-mini"] },
    { label: "OpenAI o-series", models: ["o3", "o4-mini", "o3-mini", "o1"] },
    { label: "DeepSeek", models: ["deepseek-r1"] }
  ];
  const CURATED_MODELS = MODEL_GROUPS.flatMap(g => g.models);
  const DEF = {
    temperature:0.7,
    top_p:1,
    max_completion_tokens:1200,
    frequency_penalty:0,
    presence_penalty:0,
    n:1,
    stop:"",
    seed:"",
    top_k:""
  };

  const S = {
    projects: JSON.parse(localStorage.getItem("projects") || "[]"),
    chats: JSON.parse(localStorage.getItem("chats") || "[]"),
    activeChat: localStorage.getItem("activeChat") || null,
    activeProject: localStorage.getItem("activeProject") || null,
    model: localStorage.getItem("model") || CURATED_MODELS[0],
    params: (() => {
      const p = JSON.parse(localStorage.getItem("params") || "null") || DEF;
      if(p.max_completion_tokens == null && p.max_tokens != null) p.max_completion_tokens = p.max_tokens;
      return p;
    })()
  };

  const el = id => document.getElementById(id);
  let isWaitingResponse = false;
  if(!CURATED_MODELS.includes(S.model)) S.model = CURATED_MODELS[0];
  const promptEl = el("prompt");
  const apiKeyEl = el("apiKey");
  apiKeyEl.value = localStorage.getItem("apiKey") || "";

  function save(){
    localStorage.setItem("projects", JSON.stringify(S.projects));
    localStorage.setItem("chats", JSON.stringify(S.chats));
    localStorage.setItem("activeChat", S.activeChat || "");
    localStorage.setItem("activeProject", S.activeProject || "");
    localStorage.setItem("model", S.model);
    localStorage.setItem("params", JSON.stringify(S.params));
    localStorage.setItem("apiKey", apiKeyEl.value.trim());
  }

  const activeChat = () => S.chats.find(c => c.id === S.activeChat);

  function createProject(){
    const n = prompt("Nom du projet ?", "Nouveau projet");
    if(!n) return;
    const id = crypto.randomUUID();
    S.projects.unshift({ id, name:n });
    S.activeProject = id;
    save();
    render();
  }

  function renameProject(id){
    const p = S.projects.find(x => x.id === id);
    if(!p) return;
    const n = prompt("Nouveau nom du projet", p.name);
    if(!n) return;
    p.name = n;
    save();
    render();
  }

  function deleteProject(id){
    if(!confirm("Supprimer ce projet ?")) return;
    S.projects = S.projects.filter(p => p.id !== id);
    S.chats = S.chats.map(c => c.projectId === id ? { ...c, projectId:null } : c);
    if(S.activeProject === id) S.activeProject = null;
    save();
    render();
  }

  function createChat(projectId = null){
    const id = crypto.randomUUID();
    S.chats.unshift({ id, title:"Nouveau chat", projectId, messages:[] });
    S.activeChat = id;
    S.activeProject = projectId || null;
    save();
    render();
  }

  function renameChat(id){
    const c = S.chats.find(x => x.id === id);
    if(!c) return;
    const n = prompt("Nouveau nom de la conversation", c.title);
    if(!n) return;
    c.title = n;
    save();
    render();
  }

  function deleteChat(id){
    S.chats = S.chats.filter(c => c.id !== id);
    if(S.activeChat === id) S.activeChat = S.chats[0]?.id || null;
    save();
    render();
  }

  function chatRow(c, indent=false){
    const d = document.createElement("div");
    d.className = "item" + (c.id === S.activeChat ? " active" : "");
    if(indent) d.style.marginLeft = "18px";

    d.innerHTML = `
      <span class='name'>${c.title}</span>
      <button class='icon-btn' data-a='edit' title='Renommer'>✎</button>
      <button class='icon-btn' data-a='del' title='Supprimer'>✕</button>
    `;

    d.onclick = (e) => {
      const a = e.target.dataset.a;
      if(a === "edit") return renameChat(c.id);
      if(a === "del") return deleteChat(c.id);
      S.activeChat = c.id;
      save();
      render();
    };
    return d;
  }

  function renderChats(){
    const w = el("chatList");
    w.innerHTML = "";

    // 1) PROJETS EN HAUT
    const pTitle = document.createElement("div");
    pTitle.className = "group-title";
    pTitle.innerHTML = `<span>Projets</span><button class='icon-btn' id='newProjectBtn' title='Nouveau projet'>＋</button>`;
    w.appendChild(pTitle);

    S.projects.forEach(p => {
      const h = document.createElement("div");
      h.className = "item" + (p.id === S.activeProject ? " active" : "");
      h.innerHTML = `
        <span class='name'>📁 ${p.name}</span>
        <button class='icon-btn' data-a='addchat' title='Nouveau chat dans le projet'>＋</button>
        <button class='icon-btn' data-a='edit' title='Renommer projet'>✎</button>
        <button class='icon-btn' data-a='del' title='Supprimer projet'>✕</button>
      `;

      h.onclick = (e) => {
        const a = e.target.dataset.a;
        if(a === "addchat") return createChat(p.id);
        if(a === "edit") return renameProject(p.id);
        if(a === "del") return deleteProject(p.id);
        S.activeProject = p.id;
        save();
        render();
      };

      w.appendChild(h);
      S.chats.filter(c => c.projectId === p.id).forEach(c => w.appendChild(chatRow(c, true)));
    });

    // Séparateur
    const sep = document.createElement("div");
    sep.className = "separator";
    w.appendChild(sep);

    // 2) CONVERSATIONS GÉNÉRALES EN BAS
    const gTitle = document.createElement("div");
    gTitle.className = "group-title";
    gTitle.innerHTML = `<span>Conversations générales</span><button class='icon-btn' id='newGeneralBtn' title='Nouvelle conversation générale'>＋</button>`;
    w.appendChild(gTitle);

    S.chats.filter(c => !c.projectId).forEach(c => w.appendChild(chatRow(c, false)));

    el("newProjectBtn").onclick = (e) => { e.stopPropagation(); createProject(); };
    el("newGeneralBtn").onclick = (e) => { e.stopPropagation(); createChat(null); };
  }


  function escapeHtml(str){
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function formatInline(text){
    let safe = escapeHtml(text || "");
    safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    return safe;
  }

  function formatAssistantContent(text){
    const lines = (text || "").split("\n");
    const blocks = [];
    let list = [];

    const flushList = () => {
      if(!list.length) return;
      blocks.push(`<ul>${list.map(i => `<li>${formatInline(i)}</li>`).join("")}</ul>`);
      list = [];
    };

    for(const raw of lines){
      const line = raw.trim();
      if(!line){
        flushList();
        continue;
      }

      if(/^#{1,6}\s+/.test(line)){
        flushList();
        blocks.push(`<p><strong>${formatInline(line.replace(/^#{1,6}\s+/,""))}</strong></p>`);
        continue;
      }

      if(/^>\s+/.test(line)){
        flushList();
        blocks.push(`<blockquote>${formatInline(line.replace(/^>\s+/,""))}</blockquote>`);
        continue;
      }

      if(/^[-•*]\s+/.test(line) || /^\d+[\.)]\s+/.test(line)){
        list.push(line.replace(/^([-•*]|\d+[\.)])\s+/,""));
      } else {
        flushList();
        blocks.push(`<p>${formatInline(line)}</p>`);
      }
    }

    flushList();
    return blocks.join("") || `<p>${formatInline(text || "")}</p>`;
  }

  function renderMessages(){
    const box = el("messages");
    box.innerHTML = "";
    const c = activeChat();
    if(!c) return;

    c.messages.forEach(m => {
      const row = document.createElement("div");
      row.className = "msg-row " + m.role;

      const wrap = document.createElement("div");

      const d = document.createElement("div");
      d.className = "msg " + m.role;
      if(m.role === "assistant"){
        d.innerHTML = `<div class="assistant-body">${formatAssistantContent(m.content)}</div>`;
      } else {
        d.textContent = m.content;
      }
      wrap.appendChild(d);

      const foot = document.createElement("div");
      foot.className = "msg-foot";

      if(m.role === "assistant"){
        const actions = document.createElement("div");
        actions.className = "msg-actions";

        const copyBtn = document.createElement("button");
        copyBtn.className = "msg-icon";
        copyBtn.textContent = "⧉";
        copyBtn.title = "Copier";
        copyBtn.onclick = () => navigator.clipboard.writeText(m.content);

        const regenBtn = document.createElement("button");
        regenBtn.className = "msg-icon";
        regenBtn.textContent = "↻";
        regenBtn.title = "Régénérer";
        regenBtn.onclick = () => {
          const lastUser = [...c.messages].reverse().find(x => x.role === "user");
          if(!lastUser) return;
          promptEl.value = lastUser.content;
          send();
        };

        actions.append(copyBtn, regenBtn);
        foot.appendChild(actions);
      } else {
        const b = document.createElement("button");
        b.className = "copy";
        b.textContent = "⧉";
        b.title = "Copier";
        b.onclick = () => navigator.clipboard.writeText(m.content);
        foot.appendChild(b);
      }

      wrap.appendChild(foot);
      row.appendChild(wrap);
      box.appendChild(row);
    });


    if(isWaitingResponse){
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      const wrap = document.createElement("div");
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = '<span class="typing-spinner" aria-hidden="true"></span><span>Le modèle réfléchit…</span>';
      wrap.appendChild(typing);
      row.appendChild(wrap);
      box.appendChild(row);
    }

    box.scrollTop = box.scrollHeight;
  }

  function renderModels(){
    const sel = el("modelSelect");
    sel.innerHTML = MODEL_GROUPS.map(group => {
      const opts = group.models.map(m => `<option value="${m}" ${m===S.model?"selected":""}>${m}</option>`).join("");
      return `<optgroup label="${group.label}">${opts}</optgroup>`;
    }).join("");
  }


  async function loadModelsFromApi(){
    const key = apiKeyEl.value.trim();
    if(!key) return;
    try{
      const r = await fetch("https://api.openai.com/v1/models", {
        headers: { "Authorization": "Bearer " + key }
      });
      const data = await r.json();
      const ids = new Set((data.data || []).map(m => m.id).filter(Boolean));
      const available = CURATED_MODELS.filter(m => ids.has(m));
      if(available.length && !available.includes(S.model)){
        S.model = available[0];
        save();
      }
      renderModels();
    }catch(_e){
      // fallback silencieux: on garde la liste curatée
    }
  }

  function renderParams(){
    const p = el("paramsPanel");
    p.innerHTML = `
      <div class='param'><label>temperature</label><input id='p_temperature' type='number' step='0.1' min='0' max='2' value='${S.params.temperature}'></div>
      <div class='param'><label>top_p</label><input id='p_top_p' type='number' step='0.1' min='0' max='1' value='${S.params.top_p}'></div>
      <div class='param'><label>max_completion_tokens</label><input id='p_max_completion_tokens' type='number' step='1' min='1' max='16000' value='${S.params.max_completion_tokens}'></div>
      <div class='param'><label>frequency_penalty</label><input id='p_frequency_penalty' type='number' step='0.1' min='-2' max='2' value='${S.params.frequency_penalty ?? 0}'></div>
      <div class='param'><label>presence_penalty</label><input id='p_presence_penalty' type='number' step='0.1' min='-2' max='2' value='${S.params.presence_penalty ?? 0}'></div>
      <div class='param'><label>n</label><input id='p_n' type='number' step='1' min='1' max='8' value='${S.params.n ?? 1}'></div>
      <div class='param'><label>stop</label><input id='p_stop' type='text' placeholder='Ex: END' value='${S.params.stop ?? ""}'></div>
      <div class='param'><label>seed</label><input id='p_seed' type='number' step='1' min='0' placeholder='optionnel' value='${S.params.seed ?? ""}'></div>
      <div class='param'><label>top_k</label><input id='p_top_k' type='number' step='1' min='1' placeholder='non supporté Chat Completions' value='${S.params.top_k ?? ""}'></div>
    `;

    const num = (id,key) => el(id).onchange = e => { S.params[key] = Number(e.target.value); save(); };
    num("p_temperature","temperature");
    num("p_top_p","top_p");
    num("p_max_completion_tokens","max_completion_tokens");
    num("p_frequency_penalty","frequency_penalty");
    num("p_presence_penalty","presence_penalty");
    num("p_n","n");
    el("p_stop").onchange = e => { S.params.stop = e.target.value; save(); };
    el("p_seed").onchange = e => { S.params.seed = e.target.value; save(); };
    el("p_top_k").onchange = e => { S.params.top_k = e.target.value; save(); };
  }

  function updateLayoutMode(){
    const main = document.querySelector(".main");
    const c = activeChat();
    const isHome = !isWaitingResponse && (!c || !c.messages || c.messages.length === 0);
    main.classList.toggle("home-mode", isHome);
  }

  function render(){
    renderChats();
    renderMessages();
    updateLayoutMode();
  }

  async function send(){
    const key = apiKeyEl.value.trim();
    if(!key) return alert("Ajoute la clé API");

    const text = promptEl.value.trim();
    if(!text) return;

    let c = activeChat();
    if(!c){
      createChat(null);
      c = activeChat();
    }

    c.messages.push({ role:"user", content:text });
    if(c.title === "Nouveau chat") c.title = text.slice(0, 38);
    promptEl.value = "";
    isWaitingResponse = true;
    render();

    try{
      const r = await fetch("https://api.openai.com/v1/chat/completions", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + key },
        body: JSON.stringify({
          model:S.model,
          messages:c.messages.map(m => ({ role:m.role === "assistant" ? "assistant" : "user", content:m.content })),
          temperature:S.params.temperature,
          top_p:S.params.top_p,
          max_completion_tokens:S.params.max_completion_tokens,
          frequency_penalty:S.params.frequency_penalty ?? 0,
          presence_penalty:S.params.presence_penalty ?? 0,
          n:S.params.n ?? 1,
          ...(S.params.stop ? { stop:S.params.stop } : {}),
          ...(S.params.seed !== "" ? { seed:Number(S.params.seed) } : {})
        })
      });

      const d = await r.json();
      c.messages.push({ role:"assistant", content:d.choices?.[0]?.message?.content || JSON.stringify(d) });
    }catch(e){
      c.messages.push({ role:"assistant", content:"Erreur: " + e.message });
    }finally{
      isWaitingResponse = false;
    }

    save();
    render();
  }

  el("sendBtn").onclick = send;
  const appEl = document.querySelector(".app");
  const savedSidebarState = localStorage.getItem("sidebarCollapsed") === "1";
  if(savedSidebarState) appEl.classList.add("sidebar-collapsed");

  el("toggleSidebarBtn").onclick = () => {
    appEl.classList.toggle("sidebar-collapsed");
    localStorage.setItem("sidebarCollapsed", appEl.classList.contains("sidebar-collapsed") ? "1" : "0");
  };

  el("modelSelect").onchange = e => { S.model = e.target.value; save(); };
  el("paramsBtn").onclick = () => el("paramsPanel").classList.toggle("open");
  promptEl.addEventListener("keydown", e => {
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });
  apiKeyEl.onchange = async () => { save(); await loadModelsFromApi(); };

  if(!S.chats.length) createChat(null);
  renderModels();
  renderParams();
  render();
  loadModelsFromApi();
</script>
</body>
</html>
